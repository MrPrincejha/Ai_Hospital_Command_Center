# backend/pytest.ini
[pytest]
# ── Test discovery ─────────────────────────────────────────────────────────────
testpaths      = tests
python_files   = test_*.py
python_classes = Test*
python_functions = test_*

# ── asyncio mode ───────────────────────────────────────────────────────────────
asyncio_mode = auto

# ── Output ─────────────────────────────────────────────────────────────────────
addopts =
    --tb=short
    --strict-markers
    -q

# ── Markers ────────────────────────────────────────────────────────────────────
markers =
    slow: marks tests as slow (deselect with -m "not slow")
    integration: marks integration tests that require Redis/Celery

# ── Logging ────────────────────────────────────────────────────────────────────
log_cli       = true
log_cli_level = WARNING
log_format    = %(asctime)s [%(levelname)s] %(name)s — %(message)s
